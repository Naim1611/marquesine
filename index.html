<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrusel Automático - 6 Imágenes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🎠 Carrusel de Imágenes</h1>
        <p class="subtitulo">
                <!-- Las 6 imágenes se generarán con JS -->
            </div>
            
            <!-- Botones de navegación -->
            <button class="btn-nav btn-anterior" id="btnAnterior">❮</button>
            <button class="btn-nav btn-siguiente" id="btnSiguiente">❯</button>
Desplazamiento automático | 6 imágenes</p>
        
        <div class="carrusel">
            <div class="carrusel-contenedor" id="carruselContenedor">            
            <!-- Indicadores (puntos) -->
            <div class="indicadores" id="indicadores"></div>
        </div>
        
        <div class="info">
            <p>🔄 Movimiento automático cada 3 segundos</p>
            <p>⏸️ Pausa al pasar el mouse | ▶️ Reanuda al salir</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
